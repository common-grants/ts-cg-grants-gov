name: "CD - Publish to npm"

on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v0.1.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v0.1.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@common-grants/cg-grants-gov
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Builds the package
      # TODO: Change this back to pnpm run ci after initial release
      - run: pnpm run build

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 bundles an older npm.
      - run: npm install -g npm@latest

      # Tokenless publish via npm trusted publishing; provenance is emitted
      # automatically for a public repo + public package.
      - name: Publish
        run: npm publish --access public
